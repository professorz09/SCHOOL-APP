name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs when a newer commit is pushed to the same ref —
# saves Action minutes when fixing a typo right after a push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build (verifies Vite + Vercel handler bundle)
        run: npm run build
