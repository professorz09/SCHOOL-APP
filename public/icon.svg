<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    EduGrow app icon — clean white plate, orange stylised "e", small
    dark accent dot in upper-right. Mirrors the reference style: flat
    colours, no gradient, modern minimalist mark designed to read at
    48 px and stay distinctive at full app-icon size.

    • Maskable-safe: critical glyph + dot live inside the centre 80 %
      so circle / squircle masks never clip them.
    • Pure-white plate works on iOS' default white status-bar
      backdrop and on dark Android home screens alike.
  -->

  <!-- Plate: pure white rounded square with a hair-fine slate outline
       so the icon doesn't disappear into very-light backgrounds. -->
  <rect width="512" height="512" rx="112" fill="#ffffff"/>
  <rect x="2" y="2" width="508" height="508" rx="110"
        fill="none" stroke="#e5e7eb" stroke-width="3"/>

  <!-- Orange "e" — the EduGrow mark. Two stacked shapes form the
       lowercase letterform without using a webfont (icons must be
       self-contained for offline PWA installs). -->

  <!-- Outer ring of the "e" -->
  <circle cx="248" cy="280" r="118" fill="none"
          stroke="#f97316" stroke-width="56"/>

  <!-- Crossbar — flat orange band that turns the open ring into an
       "e". Slight asymmetry to the right gives the letter momentum. -->
  <rect x="142" y="262" width="232" height="44"
        fill="#f97316" rx="4"/>

  <!-- Right-side trim — clips the bottom-right of the ring so the
       letter has the classic "e" opening pointing down-right. -->
  <path d="M310 320 Q360 320 360 360 L360 380 L260 380 L260 320 Z"
        fill="#ffffff"/>

  <!-- Tail (foot of the "e") — short downward stroke that anchors
       the letter and gives it a custom feel vs. a plain typeface "e". -->
  <rect x="330" y="288" width="30" height="80"
        fill="#f97316" rx="6" transform="rotate(8 345 328)"/>

  <!-- Accent dot — small black circle in upper-right, mirroring the
       reference. Keeps brand recognition cue (notification-like dot)
       and breaks the otherwise pure-orange palette with a hard black
       so the icon pops at thumbnail size. -->
  <circle cx="392" cy="128" r="28" fill="#0f172a"/>
</svg>
