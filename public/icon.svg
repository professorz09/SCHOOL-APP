<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>

  <!-- Maskable-safe rounded square. 96px corner radius matches Material You
       guidance and survives both circle + squircle Android masks. -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Graduation cap mortarboard — diamond seen from above-front. -->
  <path d="M256 140 L92 212 L256 284 L420 212 Z"
        fill="url(#cap)" stroke="#312e81" stroke-width="6" stroke-linejoin="round"/>

  <!-- Cap body / sweatband under the mortarboard. The arc fakes
       perspective so the cap reads as 3D, not just a rhombus. -->
  <path d="M160 246 L160 326 Q160 372 256 372 Q352 372 352 326 L352 246 L256 290 Z"
        fill="#ffffff" opacity="0.94" stroke="#312e81" stroke-width="5" stroke-linejoin="round"/>

  <!-- Tassel — rod, knot, fringe. Right-leaning to suggest motion. -->
  <rect x="412" y="212" width="12" height="118" rx="5" fill="#ffffff"/>
  <circle cx="418" cy="338" r="14" fill="#fbbf24"/>
  <path d="M412 348 L408 380 M418 350 L418 384 M424 348 L428 380"
        stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>

  <!-- EG monogram embossed under the cap — subtle, kept small so the cap
       remains the primary identity at every icon size. -->
  <text x="256" y="448" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-weight="900" font-size="46" letter-spacing="4"
        fill="#ffffff" opacity="0.95">
    EduGrow
  </text>
</svg>
