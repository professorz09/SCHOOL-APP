<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    EduGrow app icon — single bold "E" on a white plate. No other
    glyphs, no sprouts, no accents. The styling sits entirely
    inside the letter itself:
      • bold weight + balanced proportions
      • soft 10 px corner radius on every rect so the letter
        reads as a single welded shape, not four stacked bricks
      • a thin "growth" cut inside the middle arm — narrow
        notch on its right edge that makes the mid-bar end in
        a subtle upward chevron when viewed up close, but still
        reads as a plain bar at thumbnail size
      • indigo-600 solid fill for a clean modern feel

    Maskable-safe: all glyph elements sit inside the centre 80 %.
  -->

  <!-- White plate with hair-fine slate outline -->
  <rect width="512" height="512" rx="112" fill="#ffffff"/>
  <rect x="2" y="2" width="508" height="508" rx="110"
        fill="none" stroke="#e5e7eb" stroke-width="3"/>

  <!-- Single solid "E" — drawn as one closed path so the corners
       can carry refined miter joins without internal seams. The
       small wedge on the middle arm's right edge is the only
       styling moment (subtle upward tilt = growth). -->
  <path fill="#4f46e5" d="
    M 130 100
    L 382 100
    Q 392 100 392 110
    L 392 168
    Q 392 178 382 178
    L 198 178
    L 198 226
    L 348 226
    Q 358 226 358 236
    L 358 280
    Q 358 290 348 290
    L 198 290
    L 198 334
    L 382 334
    Q 392 334 392 344
    L 392 402
    Q 392 412 382 412
    L 130 412
    Q 120 412 120 402
    L 120 110
    Q 120 100 130 100
    Z
  "/>
</svg>
