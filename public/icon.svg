<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    EduGrow app icon — 2×2 grid mark on a white plate.
    Communicates "dashboard / modules" (fits a multi-feature school
    management app) with a navy + green palette that ties to the
    "Grow" half of the wordmark.

    Layout: four rounded squares with a uniform gap, the grid
    centred on the plate. Maskable-safe — every tile sits inside
    the centre 80 % so squircle / circle masks can't clip a tile.
  -->

  <!-- White plate with hair-fine slate outline so the icon stays
       visible on very-light system backgrounds. -->
  <rect width="512" height="512" rx="112" fill="#ffffff"/>
  <rect x="2" y="2" width="508" height="508" rx="110"
        fill="none" stroke="#e5e7eb" stroke-width="3"/>

  <!-- 2×2 grid: tile = 170×170, gap = 30, total = 370×370.
       Centred at x = y = 71. Tile corner radius 24 keeps the
       squares friendly without making them look like coins. -->

  <!-- Top-left — deep navy (trust, anchor) -->
  <rect x="71"  y="71"  width="170" height="170" rx="24" fill="#0f172a"/>

  <!-- Top-right — pale mint (lift, breathing space) -->
  <rect x="271" y="71"  width="170" height="170" rx="24" fill="#a7f3d0"/>

  <!-- Bottom-left — deep navy again to balance the grid diagonally -->
  <rect x="71"  y="271" width="170" height="170" rx="24" fill="#0f172a"/>

  <!-- Bottom-right — vivid green (the "Grow" cue) -->
  <rect x="271" y="271" width="170" height="170" rx="24" fill="#10b981"/>
</svg>
